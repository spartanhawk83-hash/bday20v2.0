<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Priya ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff8fa3;
            --secondary-color: #b28dff;
            --bg-gradient-start: #fff0f5;
            --bg-gradient-end: #e6e6fa;
            --text-color: #4a4a4a;
            --card-bg: rgba(255, 255, 255, 0.9);
            --sticker-bg: #fff9c4; /* Pastel yellow for stickers */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            height: 100vh;
            overflow: hidden; /* Prevent scrolling initially */
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Background Hearts Animation */
        .bg-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            bottom: -50px;
            color: rgba(255, 143, 163, 0.4);
            font-size: 20px;
            animation: floatUp 10s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* Main Container */
        #app {
            z-index: 10;
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 1rem;
            height: 100vh; /* Full height for scrolling content */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Content Cards */
        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.5s ease;
            width: 100%;
            opacity: 0;
            transform: translateY(20px);
            display: none; /* Hidden by default */
        }

        .card.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #555;
        }

        /* Buttons */
        .btn {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            padding: 12px 30px;
            color: white;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 143, 163, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            outline: none;
            /* Mobile touch target optimization */
            min-height: 48px;
            min-width: 120px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:hover {
            box-shadow: 0 8px 20px rgba(255, 143, 163, 0.6);
            transform: translateY(-2px);
        }

        /* Sticker Reveal Styling */
        #sticker-container {
            text-align: left;
            max-height: 70vh;
            overflow-y: auto;
            padding: 10px;
            width: 100%;
            scrollbar-width: thin;
            scrollbar-color: #ffb7c5 #f1f1f1;
        }

        #sticker-container::-webkit-scrollbar {
            width: 6px;
        }
        #sticker-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        #sticker-container::-webkit-scrollbar-thumb {
            background: #ffb7c5;
            border-radius: 10px;
        }

        .message-block {
            position: relative;
            margin-bottom: 2rem;
            min-height: 60px;
            display: none; /* Hidden initially */
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .message-block.visible {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .message-text {
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            line-height: 1.6;
            color: #333;
            border-left: 3px solid var(--primary-color);
        }

        .sticker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--sticker-bg);
            color: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 2;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
            transform-origin: top left;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .sticker::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 0 20px 20px;
            border-color: transparent transparent rgba(0,0,0,0.1) transparent;
            border-radius: 0 0 10px 0;
        }

        .sticker:hover {
            transform: scale(1.02);
        }

        .sticker.peeled {
            transform: rotate(-15deg) translateY(-20px) translateX(-20px) scale(0.9);
            opacity: 0;
            pointer-events: none;
        }

        /* Special Heart */
        .special-heart {
            z-index: 5 !important;
            pointer-events: auto !important;
            cursor: pointer;
        }

        .special-heart span {
            display: block;
            filter: drop-shadow(0 0 15px rgba(255, 100, 150, 0.9));
            animation: pulse 1.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        /* Popups */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .popup-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .popup-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            max-width: 85%;
            width: 350px;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .popup-overlay.show .popup-content {
            transform: scale(1);
        }

        .popup-title {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .close-popup {
            margin-top: 1rem;
            background: #eee;
            color: #555;
            font-size: 0.9rem;
            padding: 8px 20px;
        }

        /* Hint Text */
        .hint-text {
            font-size: 11px;
            opacity: 0; /* Hidden initially */
            text-align: center;
            margin-top: 30px;
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            transition: opacity 2s ease;
            display: none;
        }

        .hint-text.visible {
            display: block;
            opacity: 0.3; /* Subtle visibility */
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            p { font-size: 1rem; }
            .card { padding: 1.5rem; }
            .sticker { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <!-- Background Animation Layer -->
    <div class="bg-hearts" id="bg-hearts"></div>
    <canvas id="confetti-canvas"></canvas>

    <!-- Background Music -->
    <!-- REPLACE 'music.mp3' WITH YOUR ACTUAL AUDIO FILE PATH -->
    <audio id="bgm" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Main Application Container -->
    <main id="app">
        
        <!-- Step 0: Start -->
        <div class="card active" id="step-0">
            <p>I made something for you.<br>But you have to find it.</p>
            <button class="btn" onclick="nextStep(1)">🔎 Start Searching</button>
        </div>

        <!-- Step 1 -->
        <div class="card" id="step-1">
            <p>Today is a special day.</p>
            <button class="btn" onclick="nextStep(2)">Why?</button>
        </div>

        <!-- Step 2 -->
        <div class="card" id="step-2">
            <p>Because someone very important was born today.</p>
            <button class="btn" onclick="nextStep(3)">Who?</button>
        </div>

        <!-- Step 3: Final Reveal -->
        <div class="card" id="step-3" style="max-width: 800px; padding: 1.5rem;">
            <div id="sticker-container">
                <!-- Stickers will be injected here -->
            </div>
            <div class="hint-text">Find out what happens if you tap the screen 20 times.</div>
        </div>

    </main>

    <!-- Secret Song Popup -->
    <div class="popup-overlay" id="secret-popup">
        <div class="popup-content">
            <div class="popup-title">Secret Song For You ❤️</div>
            <p>I thought of you when I heard this.</p>
            <br>
            <a href="https://youtu.be/6q6d4waAGmI?si=t9bzRS6q4ZzIX9iI" target="_blank" class="btn">Play the song</a>
            <br>
            <button class="btn close-popup" onclick="closePopup('secret-popup')">Close</button>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const fullMessage = `Happy Birthday Priya ❤️

What a journey you have been through.
Twenty years on this earth, that’s honestly a lot of time when you really think about it.

Today I was talking about Zindagi Na Milegi Dobara, right? Or maybe I forgot, idk. Either way, the thought stayed with me. Zindagi toh mil bhi jayegi lekin apke sath ki milegi ya nhi pata nhi, isilye ye jina jaruri h ;)

You’ve grown into such a beautiful person, not just in how you look, but in who you are. Kind, thoughtful, strong in ways you probably don’t even realize. You carry so much, yet you still manage to bring warmth and light to people and me.

You’ve helped me more than you know, listened to me when I needed it, and somehow managed to make my ordinary days feel lighter just by being there. I’m really grateful that you are in my life. Yes, you have been tough to deal with too in that regard but you have been there for me more than anyone has, no joke, you are always here. Love you.

Twenty is a special number.
You're still young enough to travel, try new things, and become the person you want to be, but you're already strong and wise enough to deal with life... and apparently strong enough to deal with me too.

I really hope this year brings you joy, peace, and the strength to go after your goals. There are still so many things you will do and see in the future, and I can't wait to see how amazing you will continue to become.

And yes, you are officially 20 now…
young enough to all what i said and old enough for me to call you mommy.

I love you.

Best wishes from me, and once again,
Happy Birthday.
— Dhruv`;

        // --- State Management ---
        let currentStep = 0;
        let clickCount = 0;
        let clickTimer;
        
        // --- Background Hearts Animation ---
        function createHearts() {
            const container = document.getElementById('bg-hearts');
            const heartCount = 15;
            
            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(heart);
            }
            
            createSpecialHeart();
        }

        function createSpecialHeart() {
            const container = document.getElementById('bg-hearts');
            const heart = document.createElement('div');
            heart.classList.add('heart', 'special-heart');
            // Wrap in span for independent pulsing animation
            heart.innerHTML = '<span>❤️</span>'; 
            
            // Random position
            heart.style.left = Math.random() * 90 + 5 + 'vw';
            
            // Slower animation
            heart.style.animationDuration = '25s'; 
            heart.style.fontSize = '40px'; // Larger size
            
            // Click handler
            heart.onclick = (e) => {
                e.stopPropagation(); // Prevent triggering background clicks
                document.getElementById('secret-popup').classList.add('show');
            };
            
            container.appendChild(heart);
        }

        // --- Background Music Logic ---
        const audio = document.getElementById('bgm');
        // Set volume and speed as requested
        audio.volume = 0.07;
        audio.playbackRate = 0.75;

        function playAudio() {
            audio.play().then(() => {
                console.log("Music started");
            }).catch(e => {
                console.log("Autoplay prevented", e);
            });
            // Remove listeners after first interaction
            document.body.removeEventListener('click', playAudio);
            document.body.removeEventListener('touchstart', playAudio);
        }

        // Add listeners for first interaction
        document.body.addEventListener('click', playAudio);
        document.body.addEventListener('touchstart', playAudio);

        // --- Navigation Logic ---
        function nextStep(step) {
            // Fade out current
            const currentCard = document.getElementById(`step-${currentStep}`);
            currentCard.style.opacity = '0';
            currentCard.style.transform = 'translateY(-20px)';
            
            setTimeout(() => {
                currentCard.classList.remove('active');
                currentCard.style.display = 'none';
                
                // Fade in next
                const nextCard = document.getElementById(`step-${step}`);
                nextCard.style.display = 'block';
                // Trigger reflow
                void nextCard.offsetWidth;
                nextCard.classList.add('active');
                
                currentStep = step;

                if (step === 3) {
                    startConfetti();
                    initStickers();
                }
            }, 500);
        }

        // --- Sticker Reveal Logic ---
        function initStickers() {
            const container = document.getElementById('sticker-container');
            const paragraphs = fullMessage.split('\n\n');
            const stickerLabels = ["Open Me", "Read This", "Next Part", "Keep Going", "More...", "Almost There", "For You", "Last One", "❤️"];
            
            paragraphs.forEach((text, index) => {
                const block = document.createElement('div');
                block.className = 'message-block';
                block.id = `block-${index}`;
                
                // Content
                const content = document.createElement('div');
                content.className = 'message-text';
                content.innerHTML = text.replace(/\n/g, '<br>');
                
                // Sticker
                const sticker = document.createElement('div');
                sticker.className = 'sticker';
                sticker.innerText = stickerLabels[index % stickerLabels.length];
                sticker.onclick = () => peelSticker(index, paragraphs.length);
                
                block.appendChild(content);
                block.appendChild(sticker);
                container.appendChild(block);
            });

            // Show first block
            setTimeout(() => {
                document.getElementById('block-0').classList.add('visible');
            }, 500);
        }

        function peelSticker(index, total) {
            const block = document.getElementById(`block-${index}`);
            const sticker = block.querySelector('.sticker');
            
            sticker.classList.add('peeled');
            
            // Show next block if exists
            if (index + 1 < total) {
                setTimeout(() => {
                    const nextBlock = document.getElementById(`block-${index + 1}`);
                    nextBlock.classList.add('visible');
                    // Auto scroll to next block
                    nextBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 600);
            } else {
                // Last sticker peeled - show hint text
                setTimeout(() => {
                    const hint = document.querySelector('.hint-text');
                    hint.classList.add('visible');
                    hint.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 1000);
            }
        }

        // --- Popup Logic ---
        function closePopup(id) {
            document.getElementById(id).classList.remove('show');
        }

        // --- Secret Song Logic ---
        document.body.addEventListener('click', (e) => {
            // Count clicks anywhere
            clickCount++;
            
            // Reset count if no click for 5 seconds (increased time to allow 20 clicks)
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => {
                clickCount = 0;
            }, 5000);

            if (clickCount === 20) {
                document.getElementById('secret-popup').classList.add('show');
                clickCount = 0; // Reset
            }
        });

        // --- Confetti Logic (Decaying) ---
        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const pieces = [];
            const numberOfPieces = 150;
            const colors = ['#ff8fa3', '#b28dff', '#ffeb3b', '#8ec5fc', '#ffffff'];
            
            let startTime = Date.now();

            function randomColor() {
                return colors[Math.floor(Math.random() * colors.length)];
            }

            function update() {
                const currentTime = Date.now();
                const elapsed = currentTime - startTime;
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Determine respawn probability based on time
                let respawnChance = 1.0;
                if (elapsed > 15000) {
                    respawnChance = 0; // Stop
                } else if (elapsed > 10000) {
                    respawnChance = 0.25; // Low
                } else if (elapsed > 5000) {
                    respawnChance = 0.5; // Medium
                }

                pieces.forEach((p) => {
                    p.y += p.gravity;
                    p.rotation += p.rotationSpeed;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.opacity; // Fade out effect
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();

                    // Respawn logic
                    if (p.y > canvas.height) {
                        if (Math.random() < respawnChance) {
                            p.y = -20;
                            p.x = Math.random() * canvas.width;
                            p.opacity = 1;
                        } else {
                            // Move it way off screen so it doesn't process
                            p.y = canvas.height + 100; 
                            p.opacity = 0;
                        }
                    }
                });
                
                // Continue animation loop if there are still visible pieces or we are still spawning
                // We'll just keep it running for simplicity, but optimized
                if (elapsed < 20000) { 
                    requestAnimationFrame(update);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height); // Final clear
                }
            }

            for (let i = 0; i < numberOfPieces; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 10 + 5,
                    gravity: Math.random() * 2 + 1,
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 0.2,
                    color: randomColor(),
                    opacity: 1
                });
            }

            update();
            
            // Resize handler
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // --- Initialization ---
        window.onload = () => {
            createHearts();
        };

    </script>
</body>
</html>
